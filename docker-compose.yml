version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: ainalyst-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-finance_rag_db}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ainalyst-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EDGAR_USER_AGENT=${EDGAR_USER_AGENT}
      - POSTGRES_URI=${POSTGRES_URI}
      - COMPANIES_CSV_PATH=${COMPANIES_CSV_PATH}
      - DEFAULT_EMBEDDING_MODEL=${DEFAULT_EMBEDDING_MODEL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - DEFAULT_CHAT_MODEL=${DEFAULT_CHAT_MODEL}
      - LOG_LEVEL=${LOG_LEVEL}
      - API_AUTH_KEY=${API_AUTH_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./companies.csv:/app/companies.csv
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ainalyst-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000

volumes:
  postgres-data: